<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0e3b49">
  <meta name="description" content="۳۰۰ سوال پرتکرار کنکور ارشد روانشناسی">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>کنکور ارشد روانشناسی</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>

  <div id="splashScreen">
    <div class="splash-icon">🧠</div>
    <div class="splash-title">کنکور ارشد روانشناسی</div>
    <div class="splash-sub">در حال بارگذاری…</div>
  </div>

  <div class="container" id="appContainer"></div>

  <script src="script.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/Azmoon_P/sw.js', { scope: '/Azmoon_P/' })
          .then(r => console.log('SW:', r.scope))
          .catch(e => console.log('SW fail:', e));
      });
    }

    window.addEventListener('load', () => {
      setTimeout(() => {
        const s = document.getElementById('splashScreen');
        if (s) { s.classList.add('hide'); setTimeout(() => s.remove(), 500); }
      }, 1200);
    });

    window.addEventListener('popstate', () => {
      if ((window.__currentMode || 'home') !== 'home') {
        if (typeof renderHome === 'function') renderHome();
      } else {
        history.pushState({page:'home'}, '');
      }
    });
    history.pushState({page:'home'}, '');
  </script>

</body>
</html>
