<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0e3b49">
  <meta name="description" content="۳۰۰ سوال پرتکرار کنکور ارشد روانشناسی با دسته‌بندی موضوعی و ذخیره پیشرفت — کار می‌کند بدون اینترنت">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="کنکور روانشناسی">
  <title>کنکور ارشد روانشناسی</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
</head>
<body>

  <!-- Splash Screen -->
  <div id="splashScreen">
    <div class="splash-icon">🧠</div>
    <div class="splash-title">کنکور ارشد روانشناسی</div>
    <div class="splash-sub">در حال بارگذاری…</div>
  </div>

  <!-- Main App -->
  <div class="container" id="appContainer"></div>

  <script src="/Azmoon_P/script.js"></script>
  <script>
    // ── Service Worker ───────────────────────────────
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }

    // ── Splash Screen حذف بعد از لود ────────────────
    window.addEventListener('load', () => {
      setTimeout(() => {
        const s = document.getElementById('splashScreen');
        if (s) {
          s.classList.add('hide');
          setTimeout(() => s.remove(), 500);
        }
      }, 900);
    });

    // ── دکمه برگشت اندروید ──────────────────────────
    // هر بار که صفحه عوض می‌شود یک تاریخچه push می‌کنیم
    // وقتی کاربر Back فشار می‌دهد، به خانه برمی‌گردد
    window.addEventListener('popstate', () => {
      const mode = (window.__currentMode || 'home');
      if (mode !== 'home') {
        renderHome();
      } else {
        // اگر در خانه‌ایم و Back زد، برنامه مینیمایز می‌شود (رفتار استاندارد)
        history.pushState({ page: 'home' }, '');
      }
    });

    // Push اولیه
    history.pushState({ page: 'home' }, '');
  </script>
</body>
</html>
