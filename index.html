<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <meta name="theme-color" content="#0e3b49">
  <meta name="description" content="۳۰۰ سوال پرتکرار کنکور ارشد روانشناسی">

  <title>کنکور ارشد روانشناسی</title>

  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">

  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>

<body>

  <!-- Splash -->
  <div id="splashScreen">
    <div class="splash-icon">🧠</div>
    <div class="splash-title">کنکور ارشد روانشناسی</div>
    <div class="splash-sub">در حال بارگذاری…</div>
  </div>

  <!-- App -->
  <div class="container" id="appContainer"></div>

  <!-- JS اصلی -->
  <script src="./script.js"></script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          const reg = await navigator.serviceWorker.register('./sw.js');
          console.log('SW OK:', reg.scope);
        } catch (err) {
          console.log('SW FAIL:', err);
        }
      });
    }
  </script>

  <!-- Splash remove -->
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        const s = document.getElementById('splashScreen');

        if (s) {
          s.classList.add('hide');

          setTimeout(() => {
            s.remove();
          }, 500);
        }
      }, 900);
    });
  </script>

  <!-- Back button -->
  <script>
    window.addEventListener('popstate', () => {
      const mode = window.__currentMode || 'home';

      if (mode !== 'home') {
        if (typeof renderHome === 'function') {
          renderHome();
        }
      } else {
        history.pushState({ page: 'home' }, '');
      }
    });

    history.pushState({ page: 'home' }, '');
  </script>

</body>
</html>
